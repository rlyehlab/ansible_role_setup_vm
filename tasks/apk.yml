---
- name: Upgrade all packages
  apk:
    upgrade: yes
  tags: packages

- name: Install dependencies base with apk
  apk:
    name: "{{ alpine_packages }}"
    state: present
  tags: packages

- name: Enable Alpine community repository
  replace:
    path: /etc/apk/repositories
    regexp: '^#(.*community.*)$'
    replace: '\1'
  tags: proxmox-agent

- name: Install qemu-guest-agent
  apk:
    name: qemu-guest-agent
    update_cache: yes
    state: present
  tags: proxmox-agent

- name: Enable qemu-guest-agent at boot
  service:
    name: qemu-guest-agent
    enabled: yes
  tags: proxmox-agent

- name: Set system locale
  lineinfile:
    path: /etc/profile.d/00locale.sh
    regexp: "^export LANG="
    line: "export LANG={{ vm_locales[0] }}"
    create: yes
    mode: '0644'
  tags: locale
